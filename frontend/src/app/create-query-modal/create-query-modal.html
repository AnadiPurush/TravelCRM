<div class="modal-backdrop" (click)="onClose()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Create New Query</h2>
            <button class="btn-close" (click)="onClose()">&times;</button>
        </div>

        <div class="modal-body scrollable">
            <form [formGroup]="queryForm" (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label>Requester Name</label>
                    <input type="text" formControlName="requesterName">
                </div>

                <div class="form-group">
                    <label>Contact No</label>
                    <input type="text" formControlName="contactNo">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" formControlName="email">
                </div>

                <div class="form-group">
                    <label>From Location</label>
                    <input type="text" formControlName="fromLocation">
                </div>

                <div class="form-group row">
                    <div class="col">
                        <label>From Date</label>
                        <input type="date" formControlName="fromDate">
                    </div>
                    <div class="col">
                        <label>To Date</label>
                        <input type="date" formControlName="toDate">
                    </div>
                </div>

                <div class="form-group">
                    <label>Quoted Price</label>
                    <input type="number" formControlName="quotedPrice">
                </div>

                <div class="form-group row">
                    <div class="col">
                        <label>Status</label>
                        <select formControlName="queriesStatus">
                            <option value="" disabled>Select status</option>
                            <option *ngFor="let status of statuses; trackBy: trackByName"
                                [value]="status.name ?? status.value ?? status.id">
                                {{ status.displayName ?? status.name ?? status.label ?? status.value }}
                            </option>
                        </select>
                    </div>
                    <div class="col">
                        <label>Priority</label>
                        <select formControlName="queriesPriority">
                            <option value="" disabled>Select priority</option>
                            <option *ngFor="let priority of priorities; trackBy: trackByName"
                                [value]="priority.name ?? priority.value ?? priority.id">
                                {{ priority.displayName ?? priority.name ?? priority.label ?? priority.value }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Destination</label>
                    <input type="text" formControlName="destination">
                </div>

                <div class="form-group">
                    <label>Required Services</label>
                    <input type="text" formControlName="requiredServices">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" (click)="onClose()">Cancel</button>
                    <button type="submit" class="btn-primary" [disabled]="queryForm.invalid" (click)="onClose()">
                        Submit
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
